<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - Al-Daoudi Club</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); min-height: 100vh; }
    .container { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #1a1a2e; padding: 1.5rem 1rem; color: white; }
    .logo { text-align: center; font-size: 1.4rem; font-weight: bold; margin-bottom: 1.5rem; color: #FF6B35; }
    .menu { list-style: none; }
    .menu li { margin-bottom: 0.3rem; }
    .menu a { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; color: #aaa; text-decoration: none; border-radius: 10px; transition: 0.3s; }
    .menu a:hover, .menu a.active { background: #FF6B35; color: white; }
    .main { flex: 1; padding: 1.5rem; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .header h1 { color: white; font-size: 1.5rem; }
    .btn-logout { background: #F44336; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat { background: #16213e; padding: 1.2rem; border-radius: 14px; text-align: center; }
    .stat h3 { color: white; font-size: 2rem; }
    .stat p { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
    .card { background: #16213e; border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; }
    .card h3 { color: white; margin-bottom: 1rem; }
    .msg-item { padding: 1rem; border-radius: 10px; margin-bottom: 0.8rem; background: rgba(0,0,0,0.2); }
    .msg-item.unread { border-right: 3px solid #FF6B35; }
    .msg-name { color: white; font-weight: 600; margin-bottom: 0.3rem; }
    .msg-text { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
    .msg-date { color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 0.5rem; }
    .empty { text-align: center; color: rgba(255,255,255,0.4); padding: 2rem; }
    .badge { background: #FF6B35; color: white; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.75rem; margin-right: 0.5rem; }
    .form-row { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; }
    .form-row input, .form-row select { flex: 1; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; }
    .btn { padding: 0.6rem 1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .btn-add { background: #4CAF50; color: white; }
    .btn-del { background: #F44336; color: white; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.8rem; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
    td { color: white; }
    @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; } .menu { display: flex; flex-wrap: wrap; } }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">💪 Al-Daoudi</div>
      <ul class="menu">
        <li><a href="#" class="active" onclick="show('dashboard')">📊 الرئيسية</a></li>
        <li><a href="#" onclick="show('members')">👥 الأعضاء</a></li>
        <li><a href="#" onclick="show('messages')">📩 الرسائل <span class="badge" id="msg-badge">0</span></a></li>
        <li><a href="#" onclick="show('classes')">🏋️ الحصص</a></li>
        <li><a href="index.html">🏠 الموقع</a></li>
      </ul>
    </aside>
    <main class="main">
      <div class="header">
        <h1 id="page-title">لوحة التحكم</h1>
        <button class="btn-logout" onclick="logout()">🚪 خروج</button>
      </div>
      
      <div id="page-dashboard">
        <div class="stats">
          <div class="stat"><h3 id="total-members">0</h3><p>الأعضاء</p></div>
          <div class="stat"><h3 id="active-members">0</h3><p>نشطون</p></div>
          <div class="stat"><h3 id="total-classes">0</h3><p>الحصص</p></div>
          <div class="stat"><h3 id="total-messages">0</h3><p>الرسائل</p></div>
        <div class="card">
          <h3>📩 آخر الرسائل</h3>
          <div id="recent-messages"></div>
      </div>
      
      <div id="page-members" style="display:none;">
        <div class="card">
          <h3>👥 إدارة الأعضاء <button class="btn btn-add" style="float:left;margin-top:-5px;" onclick="showAddMember()">+ إضافة</button></h3>
          <div id="add-member-form" style="display:none;background:rgba(0,0,0,0.2);padding:1rem;margin-bottom:1rem;border-radius:10px;">
            <div class="form-row"><input id="new-name" placeholder="الاسم"><input id="new-email" placeholder="البريد"></div>
            <div class="form-row"><input id="new-phone" placeholder="الهاتف"><select id="new-membership"><option>شهر - 150 MAD</option><option>3 أشهر - 350 MAD</option><option>6 أشهر - 600 MAD</option></select></div>
            <button class="btn btn-add" onclick="addMember()">حفظ</button>
          </div>
          <table><thead><tr><th>الاسم</th><th>البريد</th><th>الباقة</th><th>إجراءات</th></tr></thead><tbody id="members-table"></tbody></table>
        </div>
      
      <div id="page-messages" style="display:none;">
        <div class="card">
          <h3>📩 الرسائل الواردة</h3>
          <div id="messages-list"></div>
      </div>
      
      <div id="page-classes" style="display:none;">
        <div class="card">
          <h3>🏋️ إدارة الحصص</h3>
          <table><thead><tr><th>الاسم</th><th>المدرب</th><th>اليوم</th><th>الوقت</th><th>إجراءات</th></tr></thead><tbody id="classes-table"></tbody></table>
        </div>
    </main>
  </div>

  <script>
    if (localStorage.getItem('gym_admin_logged') !== 'true') window.location.href = 'login.html';
    
    var members = JSON.parse(localStorage.getItem('gym_members')) || [];
    var classes = JSON.parse(localStorage.getItem('gym_classes')) || [];
    var messages = JSON.parse(localStorage.getItem('gym_messages')) || [];
    
    function show(page) {
      document.querySelectorAll('.main > div').forEach(function(d) { d.style.display = 'none'; });
      document.getElementById('page-' + page).style.display = 'block';
      document.querySelectorAll('.menu a').forEach(function(a) { a.classList.remove('active'); });
      event.target.closest('a').classList.add('active');
      document.getElementById('page-title').textContent = page === 'messages' ? 'الرسائل' : page === 'members' ? 'الأعضاء' : page === 'classes' ? 'الحصص' : 'لوحة التحكم';
      if (page === 'dashboard') loadDashboard();
      if (page === 'members') loadMembers();
      if (page === 'messages') loadMessages();
      if (page === 'classes') loadClasses();
    }
    
    function loadDashboard() {
      var active = members.filter(function(m) { return m.status === 'active'; }).length;
      document.getElementById('total-members').textContent = members.length;
      document.getElementById('active-members').textContent = active;
      document.getElementById('total-classes').textContent = classes.length;
      document.getElementById('total-messages').textContent = messages.length;
      document.getElementById('msg-badge').textContent = messages.filter(function(m) { return m.status === 'unread'; }).length;
      
      var recent = document.getElementById('recent-messages');
      if (messages.length === 0) { recent.innerHTML = '<div class="empty">لا توجد رسائل</div>'; }
      else { recent.innerHTML = messages.slice(0,3).map(function(m) { return '<div class="msg-item"><div class="msg-name">'+(m.name||'بدون')+'</div><div class="msg-text">'+m.message.substring(0,80)+'...</div>'; }).join(''); }
    }
    
    function loadMembers() {
      var tbody = document.getElementById('members-table');
      if (members.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="empty">لا توجد بيانات</td></tr>'; return; }
      tbody.innerHTML = members.map(function(m,i) { return '<tr><td>'+m.name+'</td><td>'+m.email+'</td><td>'+(m.membership||'-')+'</td><td><button class="btn btn-del" onclick="delMember('+i+')">حذف</button></td></tr>'; }).join('');
    }
    
    function loadMessages() {
      var list = document.getElementById('messages-list');
      if (messages.length === 0) { list.innerHTML = '<div class="empty">لا توجد رسائل</div>'; return; }
      list.innerHTML = messages.map(function(m) { return '<div class="msg-item '+(m.status==='unread'?'unread':'')+'"><div class="msg-name">'+(m.name||'بدون')+'</div><div class="msg-text">'+m.message+'</div><div class="msg-date">'+new Date(m.date).toLocaleDateString('ar')+'</div>'; }).join('');
    }
    
    function loadClasses() {
      var tbody = document.getElementById('classes-table');
      if (classes.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty">لا توجد حصص</td></tr>'; return; }
      tbody.innerHTML = classes.map(function(c,i) { return '<tr><td>'+c.name+'</td><td>'+(c.instructor||'-')+'</td><td>'+(c.day||'-')+'</td><td>'+(c.time||'-')+'</td><td><button class="btn btn-del" onclick="delClass('+i+')">حذف</button></td></tr>'; }).join('');
    }
    
    function showAddMember() { document.getElementById('add-member-form').style.display = document.getElementById('add-member-form').style.display === 'none' ? 'block' : 'none'; }
    function addMember() {
      var name = document.getElementById('new-name').value;
      var email = document.getElementById('new-email').value;
      if (!name || !email) return alert('الرجاء إدخال الاسم والبريد');
      members.push({ id: Date.now(), name: name, email: email, phone: document.getElementById('new-phone').value, membership: document.getElementById('new-membership').value, status: 'active' });
      localStorage.setItem('gym_members', JSON.stringify(members));
      loadMembers();
      document.getElementById('add-member-form').style.display = 'none';
    }
    function delMember(i) { if(confirm('حذف هذا العضو؟')) { members.splice(i,1); localStorage.setItem('gym_members',JSON.stringify(members)); loadMembers(); } }
    function delClass(i) { if(confirm('حذف هذه الحصة؟')) { classes.splice(i,1); localStorage.setItem('gym_classes',JSON.stringify(classes)); loadClasses(); } }
    function logout() { localStorage.removeItem('gym_admin_logged'); window.location.href = 'login.html'; }
    
    loadDashboard();
  </script>
</body>
</html>
