<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Al-Daoudi Club</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-box {
      background: #16213e;
      padding: 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo .icon { font-size: 3rem; display: block; }
    .login-logo h1 { color: #FF6B35; font-size: 1.5rem; margin-top: 0.5rem; }
    .login-logo p { color: #888; font-size: 0.85rem; margin-top: 0.3rem; }
    
    .role-selector { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
    .role-btn {
      flex: 1;
      padding: 0.8rem 0.5rem;
      border: 2px solid #333;
      border-radius: 10px;
      background: #0f0f1a;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
      color: #aaa;
    }
    .role-btn:hover { border-color: #FF6B35; }
    .role-btn.active { border-color: #FF6B35; background: rgba(255,107,53,0.1); color: #fff; }
    .role-btn .icon { font-size: 1.5rem; display: block; margin-bottom: 0.2rem; }
    .role-btn span { font-size: 0.8rem; font-weight: 600; }
    
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: #ccc; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #0f0f1a;
      color: white;
      font-size: 1rem;
    }
    .form-group input:focus { outline: none; border-color: #FF6B35; }
    
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      background: #FF6B35;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-submit:hover { background: #ff8f5a; }
    
    .error-msg {
      background: #442222;
      color: #ff6666;
      padding: 0.7rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
      font-size: 0.9rem;
    }
    .error-msg.show { display: block; }
    
    .login-form { display: none; }
    .login-form.active { display: block; }
    
    .back-link { display: block; text-align: center; margin-top: 1.2rem; color: #666; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #FF6B35; }
    
    /* Navigation */
    .nav-buttons {
      position: fixed;
      bottom: 15px;
      left: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }
    .nav-btn.up { background: #2196F3; color: white; }
    .nav-btn.down { background: #FF6B35; color: white; }
    .nav-btn:hover { transform: scale(1.1); }
  </style>
</head>
<body>
  <!-- Navigation Buttons -->
  <div class="nav-buttons">
    <button class="nav-btn up" onclick="window.scrollTo({top:0,behavior:'fast'})">▲</button>
    <button class="nav-btn down" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'fast'})">▼</button>
  </div>
  
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">💪</span>
      <h1>Al-Daoudi Club</h1>
      <p>نظام إدارة النادي</p>
    </div>
    
    <div class="role-selector">
      <button class="role-btn active" onclick="selectRole('admin')" id="btn-admin">
        <span class="icon">👨‍💼</span>
        <span>مدير</span>
      </button>
      <button class="role-btn" onclick="selectRole('assistant')" id="btn-assistant">
        <span class="icon">🏋️</span>
        <span>مساعد</span>
      </button>
    </div>
    
    <div class="error-msg" id="error-msg"></div>
    
    <!-- Admin Login -->
    <form id="admin-form" class="login-form active">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="admin-user" placeholder="أدخل اسم المستخدم" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور" required>
      </div>
      <button type="submit" class="btn-submit">🔑 دخول</button>
    </form>
    
    <!-- Assistant Login -->
    <form id="assistant-form" class="login-form">
      <div class="form-group">
        <label>اسمك</label>
        <input type="text" id="assistant-name" placeholder="أدخل اسمك" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="assistant-pass" placeholder="أدخل كلمة المرور" required>
      </div>
      <button type="submit" class="btn-submit" style="background:#2196F3;">🏋️ دخول</button>
    </form>
    
    <a href="index.html" class="back-link">← العودة للرئيسية</a>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('gym_admin_logged') === 'true') window.location.href = 'admin.html';
    if (localStorage.getItem('gym_assistant_logged') === 'true') window.location.href = 'assistant-dashboard.html';
    
    function selectRole(role) {
      document.querySelectorAll('.role-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById('btn-' + role).classList.add('active');
      document.querySelectorAll('.login-form').forEach(function(f) { f.classList.remove('active'); });
      document.getElementById(role + '-form').classList.add('active');
      document.getElementById('error-msg').classList.remove('show');
    }
    
    // Admin login
    document.getElementById('admin-form').onsubmit = function(e) {
      e.preventDefault();
      var user = document.getElementById('admin-user').value;
      var pass = document.getElementById('admin-pass').value;
      
      if (user === 'adaoudi' && pass === 'fitness2026@') {
        localStorage.setItem('gym_admin_logged', 'true');
        localStorage.setItem('gym_admin_user', user);
        window.location.href = 'admin.html';
      } else {
        showError('❌ بيانات الدخول غير صحيحة');
      }
    };
    
    // Assistant login
    document.getElementById('assistant-form').onsubmit = function(e) {
      e.preventDefault();
      var name = document.getElementById('assistant-name').value;
      var pass = document.getElementById('assistant-pass').value;
      
      if (pass === 'clubfitness2026@') {
        var assistants = JSON.parse(localStorage.getItem('gym_assistants')) || [];
        if (!assistants.find(function(a) { return a.name === name; })) {
          assistants.push({ id: Date.now(), name: name, role: 'مساعد', status: 'active' });
          localStorage.setItem('gym_assistants', JSON.stringify(assistants));
        }
        localStorage.setItem('gym_assistant_logged', 'true');
        localStorage.setItem('gym_assistant_name', name);
        window.location.href = 'assistant-dashboard.html';
      } else {
        showError('❌ كلمة المرور غير صحيحة');
      }
    };
    
    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
