<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members Management - FitLife Gym</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons">
</head>
<body>
  <!-- Admin Layout -->
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">💪 FitLife</div>
      <ul class="admin-menu">
        <li><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></li>
        <li><a href="admin-members.html" class="active"><span class="icon">👥</span> Members</a></li>
        <li><a href="admin-classes.html"><span class="icon">🏋️</span> Classes</a></li>
        <li><a href="admin-bookings.html"><span class="icon">📅</span> Bookings</a></li>
        <li><a href="admin-memberships.html"><span class="icon">💳</span> Memberships</a></li>
        <li><a href="index.html"><span class="icon">🏠</span> View Site</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <h2>Members Management</h2>
        <div class="admin-user">
          <div class="admin-user-avatar">A</div>
          <div class="admin-user-info">
            <span class="name">Administrator</span>
            <span class="role">Manager</span>
          </div>
          <button class="btn-logout" id="logout-btn">🚪 Logout</button>
        </div>
      </header>

      <div class="admin-content">
        <!-- Page Header -->
        <div class="admin-page-header">
          <div>
            <h1>Members 👥</h1>
            <p class="breadcrumb">Dashboard / Members</p>
          </div>
        </div>

        <div id="alert" class="alert"></div>
        
<!-- Search and Add -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
          <div class="search-box">
            <input type="text" id="search" placeholder="Search members...">
          </div>
          <button class="btn-add" id="add-member-btn">
            ➕ Add New Member
          </button>
        </div>

        <!-- Members Table -->
        <div class="data-card">
          <div class="data-card-header">
            <h3>📋 All Members</h3>
            <span id="member-count" style="color: rgba(255,255,255,0.6);">0 members</span>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>🆔 ID</th>
                <th>👤 Name</th>
                <th>📧 Email</th>
                <th>📱 Phone</th>
                <th>💳 Membership</th>
                <th>📅 Join Date</th>
                <th>📊 Status</th>
                <th>⚡ Actions</th>
              </tr>
            </thead>
            <tbody id="members-table">
              <!-- Will be loaded dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

<!-- Add/Edit Member Modal -->
  <div class="modal" id="member-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">➕ Add New Member</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <form id="member-form">
          <input type="hidden" id="member-id">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter member's full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter email address" required>
          </div>
          <div class="form-group">
            <label for="username">Username (for login)</label>
            <input type="text" id="username" placeholder="Enter username">
          </div>
          <div class="form-group">
            <label for="password">Password (for login)</label>
            <input type="password" id="password" placeholder="Enter password">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number">
          </div>
          <div class="form-group">
            <label for="membership_type">Membership Type</label>
            <select id="membership_type" required>
              <option value="Basic">Basic</option>
              <option value="Premium">Premium</option>
              <option value="VIP">VIP</option>
            </select>
          </div>
          <div class="form-group">
            <label for="join_date">Join Date</label>
            <input type="date" id="join_date">
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveMember()">💾 Save Member</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    let members = [];
    
    // Check auth using localStorage (simpler approach that works with the current login system)
    const isAuthenticated = localStorage.getItem('gym_admin_logged') === 'true';
    
    if (!isAuthenticated) {
      window.location.href = '/login.html';
    } else {
      loadMembers();
    }

    async function loadMembers() {
      try {
        const response = await fetch('/api/admin/members');
        members = await response.json();
        document.getElementById('member-count').textContent = `${members.length} members`;
        renderMembers(members);
      } catch (error) {
        console.error('Error loading members:', error);
        showAlert('Error loading members', 'error');
      }
    }

    function renderMembers(data) {
      const tbody = document.getElementById('members-table');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No members found</td></tr>';
        return;
      }
      
      tbody.innerHTML = data.map((member, index) => `
        <tr style="animation-delay: ${index * 0.05}s" class="animate-fade-in">
          <td><span style="color: var(--primary); font-weight: 600;">#${member.id}</span></td>
          <td>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <div style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #ff8f5a); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">${member.name.charAt(0)}</div>
              ${member.name}
            </div>
          </td>
          <td>${member.email}</td>
          <td>${member.phone || '-'}</td>
          <td><span style="background: rgba(255, 107, 53, 0.1); color: var(--primary); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 500;">${member.membership_type}</span></td>
          <td>${member.join_date}</td>
          <td><span class="status-badge ${member.status}">${member.status}</span></td>
          <td class="action-btns">
            <button class="btn-edit" onclick="editMember(${member.id})">✏️ Edit</button>
            <button class="btn-delete" onclick="deleteMember(${member.id})">🗑️ Delete</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('search').addEventListener('input', (e) => {
      const search = e.target.value.toLowerCase();
      const filtered = members.filter(m => 
        m.name.toLowerCase().includes(search) || 
        m.email.toLowerCase().includes(search) ||
        (m.phone && m.phone.includes(search))
      );
      renderMembers(filtered);
    });

    function openModal(member = null) {
      const modal = document.getElementById('member-modal');
      const form = document.getElementById('member-form');
      
      if (member) {
        document.getElementById('modal-title').textContent = '✏️ Edit Member';
        document.getElementById('member-id').value = member.id;
        document.getElementById('name').value = member.name;
        document.getElementById('email').value = member.email;
        document.getElementById('phone').value = member.phone || '';
        document.getElementById('membership_type').value = member.membership_type;
        document.getElementById('join_date').value = member.join_date;
        document.getElementById('status').value = member.status;
      } else {
        document.getElementById('modal-title').textContent = '➕ Add New Member';
        form.reset();
        document.getElementById('member-id').value = '';
        document.getElementById('join_date').value = new Date().toISOString().split('T')[0];
      }
      
      modal.classList.add('show');
    }

    function closeModal() {
      document.getElementById('member-modal').classList.remove('show');
    }

    async function saveMember() {
      const id = document.getElementById('member-id').value;
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value,
        membership_type: document.getElementById('membership_type').value,
        join_date: document.getElementById('join_date').value,
        status: document.getElementById('status').value
      };

      try {
        const url = id ? `/api/admin/members/${id}` : '/api/admin/members';
        const method = id ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          showAlert(id ? 'Member updated successfully! ✨' : 'Member added successfully! ✨', 'success');
          closeModal();
          loadMembers();
        } else {
          const error = await response.json();
          showAlert(error.error || 'Error saving member', 'error');
        }
      } catch (error) {
        showAlert('Error saving member', 'error');
      }
    }

    function editMember(id) {
      const member = members.find(m => m.id === id);
      openModal(member);
    }

    async function deleteMember(id) {
      if (confirm('Are you sure you want to delete this member? This action cannot be undone.')) {
        try {
          await fetch(`/api/admin/members/${id}`, { method: 'DELETE' });
          showAlert('Member deleted successfully! 🗑️', 'success');
          loadMembers();
        } catch (error) {
          showAlert('Error deleting member', 'error');
        }
      }
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> <span>${message}</span>`;
      alert.className = `alert show ${type}`;
      setTimeout(() => alert.classList.remove('show'), 3000);
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      // Clear localStorage
      localStorage.removeItem('gym_admin_logged');
      localStorage.removeItem('gym_admin_user');
      localStorage.removeItem('gym_user_type');
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

// Close modal on outside click
    document.getElementById('member-modal').addEventListener('click', (e) => {
      if (e.target.id === 'member-modal') {
        closeModal();
      }
    });

    // Add member button event listener
    document.getElementById('add-member-btn').addEventListener('click', () => {
      openModal();
    });
  </script>
</body>
</html>
