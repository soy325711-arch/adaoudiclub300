<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classes Management - FitLife Gym</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons">
</head>
<body>
  <!-- Admin Layout -->
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">Fit<span style="color: #FF6B35;">Life</span> Admin</div>
      <ul class="admin-menu">
        <li><a href="dashboard.html"><span class="material-icons">dashboard</span> Dashboard</a></li>
        <li><a href="admin-members.html"><span class="material-icons">people</span> Members</a></li>
        <li><a href="admin-classes.html" class="active"><span class="material-icons">fitness_center</span> Classes</a></li>
        <li><a href="admin-bookings.html"><span class="material-icons">event</span> Bookings</a></li>
        <li><a href="admin-memberships.html"><span class="material-icons">card_membership</span> Memberships</a></li>
        <li><a href="index.html"><span class="material-icons">home</span> View Site</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <h2>Classes Management</h2>
        <div class="admin-user">
          <span>Welcome, Admin</span>
          <button class="btn-logout" id="logout-btn">Logout</button>
        </div>
      </header>

      <div class="admin-content">
        <div id="alert" class="alert"></div>
        
        <!-- Add Class Button -->
        <div style="margin-bottom: 1.5rem;">
          <button class="btn-primary" onclick="openModal()">+ Add New Class</button>
        </div>

        <!-- Classes Table -->
        <div class="data-card">
          <div class="data-card-header">
            <h3>All Classes</h3>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Class Name</th>
                <th>Instructor</th>
                <th>Day</th>
                <th>Time</th>
                <th>Duration</th>
                <th>Capacity</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="classes-table">
              <!-- Will be loaded dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Class Modal -->
  <div class="modal" id="class-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add New Class</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="class-form">
          <input type="hidden" id="class-id">
          <div class="form-group">
            <label for="name">Class Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label for="instructor">Instructor</label>
            <input type="text" id="instructor" required>
          </div>
          <div class="form-group">
            <label for="day">Day</label>
            <select id="day" required>
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
              <option value="Saturday">Saturday</option>
              <option value="Sunday">Sunday</option>
            </select>
          </div>
          <div class="form-group">
            <label for="time">Time</label>
            <input type="time" id="time" required>
          </div>
          <div class="form-group">
            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" required>
          </div>
          <div class="form-group">
            <label for="capacity">Capacity</label>
            <input type="number" id="capacity" required>
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" style="background: #ccc; color: #333;" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveClass()">Save</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    let classes = [];
    
    // Check auth using localStorage (simpler approach that works with the current login system)
    const isAuthenticated = localStorage.getItem('gym_admin_logged') === 'true';
    
    if (!isAuthenticated) {
      window.location.href = '/login.html';
    } else {
      loadClasses();
    }

    async function loadClasses() {
      try {
        const response = await fetch('/api/admin/classes');
        classes = await response.json();
        renderClasses(classes);
      } catch (error) {
        console.error('Error loading classes:', error);
      }
    }

    function renderClasses(data) {
      const tbody = document.getElementById('classes-table');
      tbody.innerHTML = '';
      data.forEach(cls => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${cls.id}</td>
          <td>${cls.name}</td>
          <td>${cls.instructor}</td>
          <td>${cls.day}</td>
          <td>${cls.time}</td>
          <td>${cls.duration} min</td>
          <td>${cls.capacity}</td>
          <td class="action-btns">
            <button class="btn-edit" onclick="editClass(${cls.id})">Edit</button>
            <button class="btn-delete" onclick="deleteClass(${cls.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function openModal(cls = null) {
      const modal = document.getElementById('class-modal');
      const form = document.getElementById('class-form');
      
      if (cls) {
        document.getElementById('modal-title').textContent = 'Edit Class';
        document.getElementById('class-id').value = cls.id;
        document.getElementById('name').value = cls.name;
        document.getElementById('instructor').value = cls.instructor;
        document.getElementById('day').value = cls.day;
        document.getElementById('time').value = cls.time;
        document.getElementById('duration').value = cls.duration;
        document.getElementById('capacity').value = cls.capacity;
        document.getElementById('description').value = cls.description || '';
      } else {
        document.getElementById('modal-title').textContent = 'Add New Class';
        form.reset();
        document.getElementById('class-id').value = '';
      }
      
      modal.classList.add('show');
    }

    function closeModal() {
      document.getElementById('class-modal').classList.remove('show');
    }

    async function saveClass() {
      const id = document.getElementById('class-id').value;
      const data = {
        name: document.getElementById('name').value,
        instructor: document.getElementById('instructor').value,
        day: document.getElementById('day').value,
        time: document.getElementById('time').value,
        duration: parseInt(document.getElementById('duration').value),
        capacity: parseInt(document.getElementById('capacity').value),
        description: document.getElementById('description').value
      };

      try {
        const url = id ? `/api/admin/classes/${id}` : '/api/admin/classes';
        const method = id ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          showAlert('Class saved successfully!', 'success');
          closeModal();
          loadClasses();
        } else {
          showAlert('Error saving class', 'error');
        }
      } catch (error) {
        showAlert('Error saving class', 'error');
      }
    }

    function editClass(id) {
      const cls = classes.find(c => c.id === id);
      openModal(cls);
    }

    async function deleteClass(id) {
      if (confirm('Are you sure you want to delete this class?')) {
        try {
          await fetch(`/api/admin/classes/${id}`, { method: 'DELETE' });
          showAlert('Class deleted successfully!', 'success');
          loadClasses();
        } catch (error) {
          showAlert('Error deleting class', 'error');
        }
      }
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert show ${type}`;
      setTimeout(() => alert.classList.remove('show'), 3000);
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      // Clear localStorage
      localStorage.removeItem('gym_admin_logged');
      localStorage.removeItem('gym_admin_user');
      localStorage.removeItem('gym_user_type');
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
