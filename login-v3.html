<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Al-Daoudi Club</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-box {
      background: #1a1a2e;
      padding: 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; font-size: 3rem; margin-bottom: 0.5rem; }
    h1 { text-align: center; color: #FF6B35; font-size: 1.5rem; margin-bottom: 1.5rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .tab.active { background: #FF6B35; }
    .tab.assistant { background: #2196F3; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; color: #ccc; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: #FF6B35; }
    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      background: #FF6B35;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }
    .btn.assistant-btn { background: #2196F3; }
    .btn:hover { opacity: 0.9; }
    .error {
      background: rgba(244,67,54,0.2);
      color: #F44336;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
    .back { text-align: center; margin-top: 1rem; }
    .back a { color: #888; text-decoration: none; }
    .back a:hover { color: #FF6B35; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">💪</div>
    <h1>نادى الداودي</h1>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('admin')">مدير</button>
      <button class="tab assistant" onclick="switchTab('assistant')">مساعد</button>
    </div>
    
    <div id="error" class="error"></div>
    
    <!-- Admin Form -->
    <form id="admin-form" onsubmit="login(event, 'admin')">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="admin-user" placeholder="أدخل اسم المستخدم" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور" required>
      </div>
      <button type="submit" class="btn">دخول</button>
    </form>
    
    <!-- Assistant Form -->
    <form id="assistant-form" style="display:none" onsubmit="login(event, 'assistant')">
      <div class="form-group">
        <label>اسمك</label>
        <input type="text" id="assistant-user" placeholder="أدخل اسمك" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="assistant-pass" placeholder="أدخل كلمة المرور" required>
      </div>
      <button type="submit" class="btn assistant-btn">دخول</button>
    </form>
    
    <div class="back">
      <a href="index.html">← العودة للرئيسية</a>
    </div>
  </div>

  <script>
    function switchTab(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('admin-form').style.display = type === 'admin' ? 'block' : 'none';
      document.getElementById('assistant-form').style.display = type === 'assistant' ? 'block' : 'none';
      document.getElementById('error').style.display = 'none';
    }

    function login(e, type) {
      e.preventDefault();
      const error = document.getElementById('error');
      
      if (type === 'admin') {
        const user = document.getElementById('admin-user').value;
        const pass = document.getElementById('admin-pass').value;
        
        if (user === 'adaoudi' && pass === 'fitness2026@') {
          localStorage.setItem('gym_admin_logged', 'true');
          localStorage.setItem('gym_admin_user', user);
          window.location.href = 'admin.html';
        } else {
          error.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
          error.style.display = 'block';
        }
      } else {
        const user = document.getElementById('assistant-user').value;
        const pass = document.getElementById('assistant-pass').value;
        
        if (pass === 'clubfitness2026@') {
          let assistants = JSON.parse(localStorage.getItem('gym_assistants')) || [];
          const existing = assistants.findIndex(a => a.name.toLowerCase() === user.toLowerCase());
          
          if (existing === -1) {
            assistants.push({
              id: Date.now(),
              name: user,
              role: 'مساعد/مدرب',
              status: 'active',
              notes: 'تم إضافته تلقائياً'
            });
          }
          localStorage.setItem('gym_assistants', JSON.stringify(assistants));
          localStorage.setItem('gym_assistant_logged', 'true');
          localStorage.setItem('gym_assistant_name', user);
          window.location.href = 'assistant-dashboard.html';
        } else {
          error.textContent = '❌ كلمة المرور غير صحيحة';
          error.style.display = 'block';
        }
      }
    }
  </script>
</body>
</html>
